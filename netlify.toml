[build]
  base = "traceremove-lab-nextjs-source"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--no-audit --no-fund --prefer-offline=false"
  NETLIFY_NEXT_SKEW_PROTECTION = "true"

[functions]
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-nextjs"
